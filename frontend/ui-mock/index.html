<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Project Manager - Notion Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
        .gantt-grid {
            background-image: linear-gradient(to right, #e5e7eb 1px, transparent 1px);
            background-size: 40px 100%;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-hidden">

    <header class="h-12 border-b border-gray-200 flex items-center justify-between px-4 sticky top-0 bg-white z-20">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-layer-group text-blue-600"></i>
            <span class="font-semibold text-sm">Product Launch 2026</span>
            <span class="text-gray-400">/</span>
            <span class="text-gray-500 text-sm">Gantt View</span>
        </div>
        <div class="flex items-center space-x-4">
            <button class="text-xs font-medium text-gray-500 hover:bg-gray-100 px-2 py-1 rounded">Share</button>
            <button class="text-xs font-medium bg-blue-600 text-white px-3 py-1 rounded-md hover:bg-blue-700">New Task</button>
        </div>
    </header>

    <main class="flex h-[calc(100vh-48px)] overflow-hidden">
        
        <aside class="w-80 border-r border-gray-200 flex-shrink-0 flex flex-col bg-gray-50/30">
            <div class="h-10 flex items-center px-4 border-b border-gray-200 font-medium text-xs text-gray-400 uppercase tracking-wider">
                Task Name
            </div>
            <div class="flex-1 overflow-y-auto scrollbar-hide">
                <div class="group border-b border-gray-100 bg-white">
                    <div class="flex items-center h-10 px-2 hover:bg-gray-50 cursor-pointer transition-colors" onclick="toggleDetails()">
                        <i class="fa-solid fa-chevron-down text-[10px] w-4 text-gray-400"></i>
                        <span class="text-sm font-medium ml-1">Phase 1: Research</span>
                    </div>
                    <div class="pl-6">
                        <div class="flex items-center h-10 px-2 hover:bg-gray-50 cursor-pointer text-sm text-gray-600 border-l-2 border-transparent hover:border-blue-400">
                            Market Analysis
                        </div>
                        <div class="flex items-center h-10 px-2 hover:bg-gray-50 cursor-pointer text-sm text-gray-600 border-l-2 border-transparent hover:border-blue-400">
                            Competitor Audit
                        </div>
                    </div>
                </div>
                <div class="group border-b border-gray-100 bg-white">
                    <div class="flex items-center h-10 px-2 hover:bg-gray-50 cursor-pointer transition-colors">
                        <i class="fa-solid fa-chevron-right text-[10px] w-4 text-gray-400"></i>
                        <span class="text-sm font-medium ml-1">Phase 2: Design</span>
                    </div>
                </div>
            </div>
        </aside>

        <section class="flex-1 overflow-x-auto relative scrollbar-hide">
            <div class="h-10 flex border-b border-gray-200 bg-white sticky top-0 z-10 gantt-grid">
                <div class="flex text-[10px] text-gray-400 items-center justify-center w-40 flex-shrink-0 border-r border-gray-100">Mar 09</div>
                <div class="flex text-[10px] text-gray-400 items-center justify-center w-40 flex-shrink-0 border-r border-gray-100">Mar 10</div>
                <div class="flex text-[10px] text-gray-400 items-center justify-center w-40 flex-shrink-0 border-r border-gray-100">Mar 11</div>
                <div class="flex text-[10px] text-gray-400 items-center justify-center w-40 flex-shrink-0 border-r border-gray-100 text-blue-600 font-bold bg-blue-50/30">Mar 12 (Today)</div>
                <div class="flex text-[10px] text-gray-400 items-center justify-center w-40 flex-shrink-0 border-r border-gray-100">Mar 13</div>
                <div class="flex text-[10px] text-gray-400 items-center justify-center w-40 flex-shrink-0 border-r border-gray-100">Mar 14</div>
            </div>

            <div class="relative gantt-grid h-full">
                <div class="h-10 flex items-center relative">
                    <div class="absolute left-10 w-80 h-6 bg-blue-100 border border-blue-200 rounded-md flex items-center px-2 cursor-move group">
                        <div class="w-2 h-full absolute left-0 cursor-ew-resize opacity-0 group-hover:opacity-100 bg-blue-400/20"></div>
                        <span class="text-[11px] text-blue-700 font-medium truncate">Schedule: Research Phase</span>
                        <div class="w-2 h-full absolute right-0 cursor-ew-resize opacity-0 group-hover:opacity-100 bg-blue-400/20"></div>
                    </div>
                </div>

                <div class="h-10 flex items-center relative border-t border-gray-50">
                    <div class="absolute left-10 w-40 h-6 bg-indigo-500 rounded-md shadow-sm flex items-center px-2 cursor-pointer transition-transform hover:scale-[1.02]">
                        <span class="text-[10px] text-white font-medium">In Progress</span>
                    </div>
                    <svg class="absolute left-[200px] top-[20px] w-20 h-10 overflow-visible pointer-events-none">
                        <path d="M 0 0 L 20 0 L 20 20 L 40 20" fill="none" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowhead)"/>
                        <defs>
                            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
                                <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1" />
                            </marker>
                        </defs>
                    </svg>
                </div>

                <div class="h-10 flex items-center relative border-t border-gray-50">
                    <div class="absolute left-60 w-32 h-6 bg-gray-100 border border-gray-300 rounded-md flex items-center px-2">
                        <span class="text-[10px] text-gray-500 font-medium italic">Pending</span>
                    </div>
                </div>
            </div>
        </section>

        <aside id="sidePanel" class="fixed inset-y-0 right-0 w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-30 border-l border-gray-200">
            <div class="p-6 h-full flex flex-col">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex space-x-2">
                        <button onclick="toggleDetails()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    <div class="flex items-center space-x-3 text-gray-400 text-sm">
                        <i class="fa-solid fa-ellipsis"></i>
                    </div>
                </div>

                <div class="flex-1">
                    <input type="text" value="Market Analysis" class="text-3xl font-bold w-full border-none focus:ring-0 mb-6 placeholder-gray-300" placeholder="Untitled">
                    
                    <div class="space-y-4">
                        <div class="grid grid-cols-3 gap-4 items-center">
                            <span class="text-sm text-gray-400"><i class="fa-regular fa-calendar mr-2"></i> Date</span>
                            <div class="col-span-2 text-sm text-gray-700 hover:bg-gray-100 p-1 rounded cursor-pointer">Mar 09, 2026 → Mar 13, 2026</div>
                        </div>
                        <div class="grid grid-cols-3 gap-4 items-center">
                            <span class="text-sm text-gray-400"><i class="fa-solid fa-circle-half-stroke mr-2"></i> Status</span>
                            <div class="col-span-2">
                                <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-medium">In Progress</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-4 items-center">
                            <span class="text-sm text-gray-400"><i class="fa-solid fa-user-group mr-2"></i> Assignee</span>
                            <div class="col-span-2 flex -space-x-2">
                                <div class="w-6 h-6 rounded-full bg-indigo-500 border-2 border-white flex items-center justify-center text-[10px] text-white">AK</div>
                                <div class="w-6 h-6 rounded-full bg-emerald-500 border-2 border-white flex items-center justify-center text-[10px] text-white">S</div>
                            </div>
                        </div>
                    </div>

                    <hr class="my-8 border-gray-100">

                    <textarea class="w-full h-40 text-sm text-gray-600 border-none focus:ring-0 resize-none p-0" placeholder="Type '/' for commands, or write notes..."></textarea>
                </div>
            </div>
        </aside>

    </main>

    <script>
        function toggleDetails() {
            const panel = document.getElementById('sidePanel');
            panel.classList.toggle('translate-x-full');
        }
    </script>
</body>
</html>
